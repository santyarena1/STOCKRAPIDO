services:
  - type: web
    name: stockrapido-api
    runtime: node
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm --filter api build
    startCommand: cd apps/api && npx prisma migrate deploy && node dist/main
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEB_URL
        sync: false
